<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - NIT Hostel</title>
    <style>
        /* Your existing styles remain exactly the same */
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 1rem; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; background: #2a5298; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        .flash { padding: 10px; margin-bottom: 1rem; border-radius: 6px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; font-size: 18px; width: auto; padding: 0; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, msg in messages %}
                <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
        <form id="loginForm" method="post">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <button type="button" class="toggle-password" id="togglePassword">👁️</button>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Add external JS -->
    <script src="{{ url_for('static', filename='js/admin_login.js') }}"></script>
</body>
</html>
